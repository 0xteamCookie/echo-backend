name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "fe-admin/**"
      - ".github/workflows/fe-admin-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "fe-admin/**"
      - ".github/workflows/fe-admin-ci.yml"

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fe-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3000
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-placeholder
        run: npm run build
